<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Anı Sahnesi | Inside Out Experience</title>

<body>

      <div class="media-frame-wrapper">
        <div class="media-container" id="memoryFrame">

    <footer class="bottom-controls">

          <div class="nav-dots" id="orbCarousel"></div>
      </div>
      
      <div class="action-buttons-group">
        <button class="btn-standard btn-secondary" onclick="window.location.href='menu.html'">
